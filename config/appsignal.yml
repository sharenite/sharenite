---
default:
  push_api_key: "<%= Rails.application.credentials.appsignal %>"
  name: Sharenite
development:
  push_api_key: "<%= Rails.application.credentials.appsignal %>"
  name: Sharenite
  active: false
test:
  push_api_key: "<%= Rails.application.credentials.appsignal %>"
  name: Sharenite
  active: false
production:
  push_api_key: "<%= Rails.application.credentials.appsignal %>"
  name: Sharenite
  active: true
  revision: "<%= ENV['KAMAL_VERSION'] || ENV['APP_REVISION'] || 'unknown' %>"
staging:
  push_api_key: "<%= Rails.application.credentials.appsignal %>"
  name: Sharenite
  active: true
  revision: "<%= ENV['KAMAL_VERSION'] || ENV['APP_REVISION'] || 'unknown' %>"

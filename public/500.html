<!doctype html>

<html lang="en">

  <head>

    <title>500 — Something Went Wrong</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/error-pages.css">

  </head>

  <body>

    <main>
      <header class="error-page__header">
        <div class="error-page__code">500</div>
        <div class="error-page__title">Something Went Wrong</div>
      </header>
      <article>
        <p><strong>We couldn’t complete that request.</strong> Try again in a moment. If the problem continues, the issue may need attention on our side. If you are the application owner check the logs for more information.</p>
      </article>
    </main>

  </body>

</html>

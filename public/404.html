<!doctype html>

<html lang="en">

  <head>

    <title>404 — Not Found</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/error-pages.css">

  </head>

  <body>

    <main>
      <header class="error-page__header">
        <div class="error-page__code">404</div>
        <div class="error-page__title">Not Found</div>
      </header>
      <article>
        <p><strong>The page you were looking for doesn’t exist.</strong> You may have mistyped the address or the page may have moved. If you are the application owner check the logs for more information.</p>
      </article>
    </main>

  </body>

</html>
